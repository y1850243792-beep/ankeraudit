<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北美 3C 赛道广告投放审计 | Anker 全球广告专员岗位申请 · 颜忠毅</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: #08080a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .scroll-container {
    height: 100vh;
    width: 100vw;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
  }

  .page {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    position: relative;
    background: #08080a;
  }

  .page iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Navigation dots */
  .nav-dots {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .nav-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    padding: 0;
  }
  .nav-dot:hover { background: rgba(255,255,255,0.35); transform: scale(1.3); }
  .nav-dot.active { background: #4dabf7; box-shadow: 0 0 8px rgba(77,171,247,0.4); }

  /* Scroll hint at bottom of page 1 */
  .scroll-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 1;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  .scroll-hint.hidden { opacity: 0; }
  .scroll-hint span {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .scroll-hint .chevron {
    width: 14px; height: 14px;
    border-right: 1.5px solid rgba(255,255,255,0.2);
    border-bottom: 1.5px solid rgba(255,255,255,0.2);
    transform: rotate(45deg);
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50% { transform: rotate(45deg) translateY(4px); }
  }

  @media (max-width: 768px) {
    .nav-dots { right: 8px; gap: 8px; }
    .nav-dot { width: 6px; height: 6px; }
  }
</style>
</head>
<body>

<div class="scroll-container" id="scroller">
  <div class="page" data-page="1"><iframe src="pages/page1-cover.html"></iframe></div>
  <div class="page" data-page="2"><iframe src="pages/page2-traffic-channel.html"></iframe></div>
  <div class="page" data-page="3"><iframe src="pages/page3-ad-assets-abtest.html"></iframe></div>
  <div class="page" data-page="4"><iframe src="pages/page4-tech-stack.html"></iframe></div>
  <div class="page" data-page="5"><iframe src="pages/page5-campaign-crosscheck.html"></iframe></div>
  <div class="page" data-page="6"><iframe src="pages/page6-action-plan.html"></iframe></div>
</div>

<!-- Navigation dots -->
<div class="nav-dots" id="navDots">
  <button class="nav-dot active" data-target="1"></button>
  <button class="nav-dot" data-target="2"></button>
  <button class="nav-dot" data-target="3"></button>
  <button class="nav-dot" data-target="4"></button>
  <button class="nav-dot" data-target="5"></button>
  <button class="nav-dot" data-target="6"></button>
</div>

<!-- Scroll hint -->
<div class="scroll-hint" id="scrollHint">
  <span>向下滚动</span>
  <div class="chevron"></div>
</div>

<script>
(function() {
  var scroller = document.getElementById('scroller');
  var dots = document.querySelectorAll('.nav-dot');
  var hint = document.getElementById('scrollHint');
  var pages = document.querySelectorAll('.page');
  var currentPage = 0;

  // Click dot → scroll to page
  document.getElementById('navDots').addEventListener('click', function(e) {
    var dot = e.target.closest('.nav-dot');
    if (!dot) return;
    var target = parseInt(dot.getAttribute('data-target'));
    pages[target - 1].scrollIntoView({ behavior: 'smooth' });
  });

  // Track current page on scroll
  scroller.addEventListener('scroll', function() {
    var scrollTop = scroller.scrollTop;
    var viewH = scroller.clientHeight;
    var pageIndex = Math.round(scrollTop / viewH);

    if (pageIndex !== currentPage) {
      currentPage = pageIndex;
      dots.forEach(function(d, i) {
        d.classList.toggle('active', i === currentPage);
      });
      // Hide hint after scrolling past first page
      if (currentPage > 0) {
        hint.classList.add('hidden');
      } else {
        hint.classList.remove('hidden');
      }
    }
  });

  // Touch support: ensure snap on mobile
  var touchTimeout;
  scroller.addEventListener('touchend', function() {
    clearTimeout(touchTimeout);
    touchTimeout = setTimeout(function() {
      var scrollTop = scroller.scrollTop;
      var viewH = scroller.clientHeight;
      var targetPage = Math.round(scrollTop / viewH);
      pages[targetPage].scrollIntoView({ behavior: 'smooth' });
    }, 80);
  });
})();
</script>

</body>
</html>
