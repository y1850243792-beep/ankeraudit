<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北美 3C 竞争基准审计 — 封面页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei','DM Sans',sans-serif;
    background:#161616;
    color:#f5f5f7;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    overflow-y:auto;
    padding:40px 0;
    -webkit-font-smoothing:antialiased;
  }

  .grid {
    display:grid;
    width:min(1200px, 96vw);
    max-width:1200px;
    padding:28px;
    gap:6px;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(3,1fr);
    grid-template-areas:
      "hero  hero  hero  hero"
      "hero  hero  hero  hero"
      "name  name  agenda agenda";
    aspect-ratio:52/24;
    min-height:560px;
  }

  .card {
    border-radius:20px;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
  }

  /* HERO 主标题卡 */
  .card-hero {
    grid-area:hero;
    background:linear-gradient(160deg, #141e2e 0%, #0e1620 50%, #0e1620 100%);
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:48px 72px;
  }
  .card-hero::before {
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, #2679FF, #F5A623, #3ED9A1);
    border-radius:20px 20px 0 0;z-index:1;
  }
  .card-hero::after {
    content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:600px;height:320px;border-radius:50%;
    background:radial-gradient(circle, rgba(38,121,255,0.04) 0%, transparent 70%);
    pointer-events:none;
  }

  .hero-title {
    font-size:46px;font-weight:700;color:#f5f5f7;
    letter-spacing:0.04em;line-height:1.3;max-width:880px;
  }

  .hero-divider {
    width:80px;height:2px;
    background:linear-gradient(90deg, #2679FF, #F5A623, #3ED9A1);
    border-radius:1px;margin:24px auto 20px;
  }

  .hero-sub {
    font-size:16px;font-weight:500;color:#a0a0a8;
    letter-spacing:0.06em;line-height:1.5;
  }

  .hero-date {
    font-size:11px;font-weight:500;color:#666;
    letter-spacing:0.08em;margin-top:20px;
  }

  /* 作者卡片 */
  .card-name {
    grid-area:name;
    background:linear-gradient(160deg, #1a1a20 0%, #1a1a20 100%);
    justify-content:center;align-items:center;text-align:center;
  }
  .name-label {
    font-size:10px;font-weight:600;color:#888;
    text-transform:uppercase;letter-spacing:0.12em;
    margin-bottom:8px;
  }
  .name-text {
    font-size:36px;font-weight:700;color:#f5f5f7;
    letter-spacing:0.10em;
  }

  /* 议程卡片 */
  .card-agenda {
    grid-area:agenda;
    background:linear-gradient(160deg, #1a1a20 0%, #1a1a20 100%);
    justify-content:center;padding:28px 32px;
  }
  .agenda-label {
    font-size:9px;font-weight:600;color:#888;
    text-transform:uppercase;letter-spacing:0.12em;
    margin-bottom:16px;
  }
  .agenda-list { display:flex;flex-direction:column;gap:14px; }
  .agenda-item { display:flex;align-items:flex-start;gap:12px; }
  .agenda-num {
    flex-shrink:0;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
  }
  .num-1 { background:rgba(38,121,255,0.15); color:#2679FF; }
  .num-2 { background:rgba(245,166,35,0.15); color:#F5A623; }
  .num-3 { background:rgba(62,217,161,0.15); color:#3ED9A1; }
  .num-4 { background:rgba(245,95,95,0.15); color:#f55f5f; }

  .agenda-text { font-size:14px;font-weight:500;color:#ccc;letter-spacing:0.03em;line-height:1.5; }
</style>
</head>
<body>
<div class="grid">

  <div class="card card-hero">
    <div class="hero-title">北美 3C 赛道广告投放与竞争基准审计</div>
    <div class="hero-date">基于 Similarweb、Meta Ads Library 与 Wappalyzer · June 2026</div>
  </div>

  <div class="card card-name">
    <div class="name-label fd">Presented by</div>
    <div class="name-text">颜忠毅</div>
  </div>

  <div class="card card-agenda">
    <div class="agenda-list">
      <div class="agenda-item">
        <div class="agenda-num num-1">1</div>
        <div class="agenda-text">流量大盘与渠道结构归因</div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num num-2">2</div>
        <div class="agenda-text">前端资产 A/B 测试框架与合规风控</div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num num-3">3</div>
        <div class="agenda-text">后端再营销技术栈链路审计</div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num num-4">4</div>
        <div class="agenda-text">节点策略与数据交叉印证</div>
      </div>
    </div>
  </div>

  <div style="grid-column:1/-1;font-size:8px;color:#555;font-family:'DM Sans',sans-serif;letter-spacing:0.03em;text-align:left;margin-top:2px;">*Data Source: Similarweb Pro, Meta Ads Library, Wappalyzer. GEO: North America (US). Device: Desktop & Mobile. Period: May-June 2026.</div>

</div>
</body>
</html>
